<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Manager with Daily Quote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cookie-manager-wrapper">
    <!-- Add Daily Quote Component -->
    <div class="quote-section" id="dailyQuote">
      Loading quote...
    </div>
    <!-- Canvas element for rendering aurora effect -->
    <canvas id="auroraCanvas"></canvas>
    <div class="cookie-manager-header">
      <h2>Cookie Manager</h2>
      <!-- Add weather widget -->
      <div class="weather-widget weather-loading">
        <i class="weather-icon wi wi-day-sunny"></i>
        <div class="weather-info">
          <div class="weather-temp">Loading...</div>
          <div class="weather-location">Locating...</div>
        </div>
      </div>
    </div>
    <input type="text" id="searchCookie" placeholder="Search Cookies...">
    
    <div class="cookie-actions">
      <div class="cookie-group">
        <button id="getCookies" class="btn-primary">Get Cookies</button>
        <button id="addCookie" class="btn-primary">Add Cookie</button>
        <button id="importCookies" class="btn-primary">Import Cookies</button>
      </div>
      <hr />
      <div class="cookie-group">
        <button id="exportCookies" class="btn-primary">Export Cookies</button>
        <button id="deleteAllCookies" class="btn-danger">Delete All Cookies</button>
      </div>
      <hr />
      <div class="cookie-group pin-group">
        <button id="pinAllCookies" class="btn-success">Pin All</button>
        <button id="unpinAllCookies" class="btn-danger">Unpin All</button>
        <button id="refreshPage" class="btn-secondary">Refresh Page</button>
      </div>
    </div>

    <div class="cookie-section">
      <h3>
        Current Cookies
        <span class="badge" id="cookieCount">0</span>
        <button id="deleteCurrentCookies" class="btn-danger">Delete Current Cookies</button>
      </h3>
      <table id="cookieTable">
        <thead>
          <tr>
            <th width="60">Name</th>
            <th>Value</th>
            <th width="118">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="pinned-section">
      <h3>
        Pinned Cookies
        <span class="badge" id="pinnedCount">0</span>
        <button id="applyToCurrent" class="btn-success">Apply to Current Page</button>
      </h3>
      <table id="pinnedTable">
        <thead>
          <tr>
            <th width="60">Name</th>
            <th>Value</th>
            <th width="118">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  <!-- If `md5.min.js` is not used in the other scripts, remove this line -->
  <!-- <script src="md5.min.js"></script> -->
  <script src="popup.js" defer></script>
  <script src="aurora.js" defer></script>
  <script src="weather.js" defer></script>
</body>
</html>
