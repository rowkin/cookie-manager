<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__MSG_extName__</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cookie-manager-wrapper">
    <!-- Add Daily Quote Component -->
    <div class="quote-section" id="dailyQuote">
      __MSG_loadingQuote__
    </div>
    <!-- Canvas element for rendering aurora effect -->
    <canvas id="auroraCanvas"></canvas>
    <div class="cookie-manager-header">
      <h2>__MSG_extName__</h2>
      <!-- Add weather widget -->
      <div class="weather-widget weather-loading">
        <i class="weather-icon wi wi-day-sunny"></i>
        <div class="weather-info">
          <div class="weather-temp">Loading...</div>
          <div class="weather-location">Locating...</div>
        </div>
      </div>
    </div>
    <input type="text" id="searchCookie" placeholder="__MSG_searchPlaceholder__">
    
    <div class="cookie-actions">
      <div class="cookie-group">
        <button id="getCookies" class="btn-primary">__MSG_getCookies__</button>
        <button id="addCookie" class="btn-primary">__MSG_addCookie__</button>
        <button id="importCookies" class="btn-primary">__MSG_importCookies__</button>
      </div>
      <hr />
      <div class="cookie-group">
        <button id="exportCookies" class="btn-primary">__MSG_exportCookies__</button>
        <button id="deleteAllCookies" class="btn-danger">__MSG_deleteAllCookies__</button>
      </div>
      <hr />
      <div class="cookie-group pin-group">
        <button id="pinAllCookies" class="btn-success">__MSG_pinAll__</button>
        <button id="unpinAllCookies" class="btn-danger">__MSG_unpinAll__</button>
        <button id="refreshPage" class="btn-secondary">__MSG_refreshPage__</button>
      </div>
    </div>

    <div class="cookie-section">
      <h3>
        __MSG_currentCookies__
        <span class="badge" id="cookieCount">0</span>
        <button id="deleteCurrentCookies" class="btn-danger">__MSG_deleteCurrentCookies__</button>
      </h3>
      <table id="cookieTable">
        <thead>
          <tr>
            <th width="60">Name</th>
            <th>Value</th>
            <th width="118">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="pinned-section">
      <h3>
        __MSG_pinnedCookies__
        <span class="badge" id="pinnedCount">0</span>
        <button id="applyToCurrent" class="btn-success">__MSG_applyToCurrent__</button>
      </h3>
      <table id="pinnedTable">
        <thead>
          <tr>
            <th width="60">Name</th>
            <th>Value</th>
            <th width="118">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Aggiungi pulsante di navigazione rapida -->
    <div class="quick-nav" style="display: none;">
      <button class="scroll-top" title="Scroll to top">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
        </svg>
      </button>
      <button class="scroll-bottom" title="Scroll to bottom">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
        </svg>
      </button>
    </div>
  </div>  
  <script src="md5.min.js"></script>
  <script src="popup.js" defer></script>
  <script src="aurora.js" defer></script>
  <script src="weather.js" defer></script>
</body>
</html>
